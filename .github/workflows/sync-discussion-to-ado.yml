name: Sync Labeled Discussion to Power Automate

on:
  discussion:
    types: [labeled]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "send"
        type: choice
        options:
          - send
          - backfill-triage
      label:
        description: "Label to simulate (send action only)"
        required: false
        default: "bug"
        type: choice
        options:
          - bug
          - feature
      discussion_title:
        description: "Discussion title (send action only)"
        required: false
        default: "Test: Login page crashes on mobile"
      discussion_body:
        description: "Discussion body (send action only)"
        required: false
        default: "Steps to reproduce: 1. Open app on mobile 2. Tap login 3. App crashes"
      discussion_number:
        description: "Discussion number (send action only)"
        required: false
        default: "1"
      discussion_url:
        description: "Discussion URL (send action only)"
        required: false
        default: "https://github.com/golclinics/discussions/discussions/1"
      discussion_author:
        description: "Discussion author (send action only)"
        required: false
        default: "test-user"

permissions:
  contents: read
  discussions: write

jobs:
  send-to-power-automate:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.action == 'send') ||
      github.event.label.name == 'bug' ||
      github.event.label.name == 'feature'
    runs-on: ubuntu-latest

    steps:
      - name: Validate Required Secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}" ] && MISSING="$MISSING POWER_AUTOMATE_WEBHOOK_URL (secret)"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required config:$MISSING"
            exit 1
          fi
          echo "POWER_AUTOMATE_WEBHOOK_URL: [set]"

      - name: Resolve Inputs
        id: inputs
        env:
          # Single-line values — safe as plain env vars
          EVENT_LABEL:        ${{ github.event.label.name }}
          EVENT_NUMBER:       ${{ github.event.discussion.number }}
          EVENT_URL:          ${{ github.event.discussion.html_url }}
          EVENT_AUTHOR:       ${{ github.event.discussion.user.login }}
          EVENT_CREATED:      ${{ github.event.discussion.created_at }}
          INPUT_LABEL:        ${{ inputs.label }}
          INPUT_NUMBER:       ${{ inputs.discussion_number }}
          INPUT_URL:          ${{ inputs.discussion_url }}
          INPUT_AUTHOR:       ${{ inputs.discussion_author }}
          # Multiline values — toJSON() encodes newlines as \n making them single-line safe
          EVENT_TITLE_JSON:   ${{ toJSON(github.event.discussion.title) }}
          EVENT_BODY_JSON:    ${{ toJSON(github.event.discussion.body) }}
          INPUT_TITLE_JSON:   ${{ toJSON(inputs.discussion_title) }}
          INPUT_BODY_JSON:    ${{ toJSON(inputs.discussion_body) }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "label=$INPUT_LABEL"                           >> "$GITHUB_OUTPUT"
            echo "number=$INPUT_NUMBER"                         >> "$GITHUB_OUTPUT"
            echo "url=$INPUT_URL"                               >> "$GITHUB_OUTPUT"
            echo "author=$INPUT_AUTHOR"                         >> "$GITHUB_OUTPUT"
            echo "created_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
            # Decode JSON-encoded strings into temp files — safe for any content
            printf '%s' "$INPUT_TITLE_JSON" | jq -r . > /tmp/discussion_title.txt
            printf '%s' "$INPUT_BODY_JSON"  | jq -r . > /tmp/discussion_body.txt
          else
            echo "label=$EVENT_LABEL"                           >> "$GITHUB_OUTPUT"
            echo "number=$EVENT_NUMBER"                         >> "$GITHUB_OUTPUT"
            echo "url=$EVENT_URL"                               >> "$GITHUB_OUTPUT"
            echo "author=$EVENT_AUTHOR"                         >> "$GITHUB_OUTPUT"
            echo "created_at=$EVENT_CREATED"                    >> "$GITHUB_OUTPUT"
            printf '%s' "$EVENT_TITLE_JSON" | jq -r . > /tmp/discussion_title.txt
            printf '%s' "$EVENT_BODY_JSON"  | jq -r . > /tmp/discussion_body.txt
          fi

      - name: Build Payload
        env:
          URL:     ${{ steps.inputs.outputs.url }}
          AUTHOR:  ${{ steps.inputs.outputs.author }}
          LABEL:   ${{ steps.inputs.outputs.label }}
          NUMBER:  ${{ steps.inputs.outputs.number }}
          CREATED: ${{ steps.inputs.outputs.created_at }}
          REPO:    ${{ github.repository }}
        run: |
          # Read user content from temp files — never went through GITHUB_OUTPUT
          TITLE=$(cat /tmp/discussion_title.txt)
          BODY=$(cat /tmp/discussion_body.txt)

          jq -n \
            --arg number   "$NUMBER" \
            --arg title    "$TITLE" \
            --arg body     "$BODY" \
            --arg author   "$AUTHOR" \
            --arg label    "$LABEL" \
            --arg url      "$URL" \
            --arg repo     "$REPO" \
            --arg created  "$CREATED" \
            '{
              number:     ($number | tonumber),
              title:      $title,
              body:       $body,
              author:     $author,
              label:      $label,
              url:        $url,
              repository: $repo,
              created_at: $created
            }' > /tmp/pa_payload.json

          echo "--- Payload ---"
          cat /tmp/pa_payload.json

      - name: Send to Power Automate
        id: send
        env:
          WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/pa_payload.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESP_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "$RESP_BODY"

          # Power Automate returns 202 Accepted for async flows
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Power Automate webhook returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "::notice::Successfully sent discussion #${{ steps.inputs.outputs.number }} to Power Automate"

      - name: Apply Triaged Label
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          DISC_NUM: ${{ steps.inputs.outputs.number }}
        run: |
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"

          # Get triaged label ID, create the label if it doesn't exist
          LABEL_ID=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                label(name: "triaged") { id }
              }
            }' \
            -f owner="$OWNER" \
            -f repo="$REPO_NAME" \
            --jq '.data.repository.label.id')

          if [ -z "$LABEL_ID" ] || [ "$LABEL_ID" = "null" ]; then
            echo "Creating 'triaged' label..."
            REPO_NODE_ID=$(gh api graphql \
              -f query='query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) { id }
              }' \
              -f owner="$OWNER" \
              -f repo="$REPO_NAME" \
              --jq '.data.repository.id')
            LABEL_ID=$(gh api graphql \
              -f query='mutation($repoId: ID!, $name: String!, $color: String!) {
                createLabel(input: {repositoryId: $repoId, name: $name, color: $color}) {
                  label { id }
                }
              }' \
              -f name="triaged" \
              -f color="0e8a16" \
              -f repoId="$REPO_NODE_ID" \
              --jq '.data.createLabel.label.id')
          fi

          # Get discussion node ID
          DISC_NODE_ID=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                discussion(number: $number) { id }
              }
            }' \
            -f owner="$OWNER" \
            -f repo="$REPO_NAME" \
            -F number="$DISC_NUM" \
            --jq '.data.repository.discussion.id')

          # Apply triaged label to the discussion
          gh api graphql \
            -f query='mutation($labelableId: ID!, $labelIds: [ID!]!) {
              addLabelsToLabelable(input: {labelableId: $labelableId, labelIds: $labelIds}) {
                labelable { ... on Discussion { number } }
              }
            }' \
            -f labelableId="$DISC_NODE_ID" \
            -f "labelIds[]=$LABEL_ID"

          echo "::notice::Applied 'triaged' label to discussion #$DISC_NUM"

  backfill-triage:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'backfill-triage'
    runs-on: ubuntu-latest

    steps:
      - name: Apply Triaged Label to Unprocessed Discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"

          # Get triaged label ID, create it if missing
          LABEL_ID=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                label(name: "triaged") { id }
              }
            }' \
            -f owner="$OWNER" \
            -f repo="$REPO_NAME" \
            --jq '.data.repository.label.id')

          if [ -z "$LABEL_ID" ] || [ "$LABEL_ID" = "null" ]; then
            echo "Creating 'triaged' label..."
            REPO_NODE_ID=$(gh api graphql \
              -f query='query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) { id }
              }' \
              -f owner="$OWNER" \
              -f repo="$REPO_NAME" \
              --jq '.data.repository.id')
            LABEL_ID=$(gh api graphql \
              -f query='mutation($repoId: ID!, $name: String!, $color: String!) {
                createLabel(input: {repositoryId: $repoId, name: $name, color: $color}) {
                  label { id }
                }
              }' \
              -f name="triaged" \
              -f color="0e8a16" \
              -f repoId="$REPO_NODE_ID" \
              --jq '.data.createLabel.label.id')
          fi

          echo "Triaged label ID: $LABEL_ID"

          # Paginate through all discussions; apply triaged to those with bug/feature but not triaged
          CURSOR=""
          TOTAL=0
          while true; do
            if [ -z "$CURSOR" ]; then
              AFTER_ARG=""
            else
              AFTER_ARG=", after: \\\"$CURSOR\\\""
            fi

            PAGE=$(gh api graphql \
              -f query="query(\$owner: String!, \$repo: String!) {
                repository(owner: \$owner, name: \$repo) {
                  discussions(first: 50$AFTER_ARG) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      id
                      number
                      labels(first: 20) {
                        nodes { name }
                      }
                    }
                  }
                }
              }" \
              -f owner="$OWNER" \
              -f repo="$REPO_NAME")

            HAS_NEXT=$(echo "$PAGE" | jq -r '.data.repository.discussions.pageInfo.hasNextPage')
            CURSOR=$(echo "$PAGE"   | jq -r '.data.repository.discussions.pageInfo.endCursor')

            # Select discussions that have bug or feature but not triaged
            DISC_IDS=$(echo "$PAGE" | jq -r '
              .data.repository.discussions.nodes[]
              | select(
                  (.labels.nodes | map(.name) | (contains(["bug"]) or contains(["feature"])))
                  and
                  (.labels.nodes | map(.name) | contains(["triaged"]) | not)
                )
              | .id + " " + (.number | tostring)
            ')

            while IFS= read -r line; do
              [ -z "$line" ] && continue
              DISC_ID=$(echo  "$line" | cut -d' ' -f1)
              DISC_NUM=$(echo "$line" | cut -d' ' -f2)

              gh api graphql \
                -f query='mutation($labelableId: ID!, $labelIds: [ID!]!) {
                  addLabelsToLabelable(input: {labelableId: $labelableId, labelIds: $labelIds}) {
                    labelable { ... on Discussion { number } }
                  }
                }' \
                -f labelableId="$DISC_ID" \
                -f "labelIds[]=$LABEL_ID"

              echo "Triaged discussion #$DISC_NUM"
              TOTAL=$((TOTAL + 1))
            done <<< "$DISC_IDS"

            [ "$HAS_NEXT" != "true" ] && break
          done

          echo "::notice::Backfill complete — applied 'triaged' label to $TOTAL discussion(s)"
