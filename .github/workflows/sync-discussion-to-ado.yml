name: Sync Labeled Discussion to Azure DevOps

on:
  discussion:
    types: [labeled]
  workflow_dispatch:
    inputs:
      label:
        description: "Label to simulate"
        required: true
        default: "bug"
        type: choice
        options:
          - bug
          - feature
      discussion_title:
        description: "Discussion title"
        required: true
        default: "Test: Login page crashes on mobile"
      discussion_body:
        description: "Discussion body"
        required: true
        default: "Steps to reproduce: 1. Open app on mobile 2. Tap login 3. App crashes"
      discussion_number:
        description: "Discussion number"
        required: true
        default: "1"
      discussion_url:
        description: "Discussion URL"
        required: true
        default: "https://github.com/golclinics/discussions/discussions/1"
      discussion_author:
        description: "Discussion author"
        required: true
        default: "test-user"

permissions:
  contents: read
  discussions: write

jobs:
  create-ado-work-item:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'bug' ||
      github.event.label.name == 'feature'
    runs-on: ubuntu-latest

    steps:
      - name: Validate Required Secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.ADO_PAT }}"     ] && MISSING="$MISSING ADO_PAT"
          [ -z "${{ secrets.ADO_ORG }}"     ] && MISSING="$MISSING ADO_ORG"
          [ -z "${{ secrets.ADO_PROJECT }}" ] && MISSING="$MISSING ADO_PROJECT"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Resolve Inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "label=${{ inputs.label }}"                  >> "$GITHUB_OUTPUT"
            echo "title=${{ inputs.discussion_title }}"       >> "$GITHUB_OUTPUT"
            echo "body=${{ inputs.discussion_body }}"         >> "$GITHUB_OUTPUT"
            echo "number=${{ inputs.discussion_number }}"     >> "$GITHUB_OUTPUT"
            echo "url=${{ inputs.discussion_url }}"           >> "$GITHUB_OUTPUT"
            echo "author=${{ inputs.discussion_author }}"     >> "$GITHUB_OUTPUT"
          else
            echo "label=${{ github.event.label.name }}"                 >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.discussion.title }}"           >> "$GITHUB_OUTPUT"
            echo "body=${{ github.event.discussion.body }}"             >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.discussion.number }}"         >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.discussion.html_url }}"          >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.discussion.user.login }}"     >> "$GITHUB_OUTPUT"
          fi

      - name: Map Label to Work Item Type
        id: map_label
        run: |
          case "${{ steps.inputs.outputs.label }}" in
            bug)     echo "wi_type=Bug"     >> "$GITHUB_OUTPUT" ;;
            feature) echo "wi_type=Feature" >> "$GITHUB_OUTPUT" ;;
            *)       echo "wi_type=Issue"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build ADO Payload
        env:
          TITLE:  ${{ steps.inputs.outputs.title }}
          BODY:   ${{ steps.inputs.outputs.body }}
          URL:    ${{ steps.inputs.outputs.url }}
          AUTHOR: ${{ steps.inputs.outputs.author }}
          LABEL:  ${{ steps.inputs.outputs.label }}
          NUMBER: ${{ steps.inputs.outputs.number }}
        run: |
          DESC=$(jq -rn \
            --arg body   "$BODY" \
            --arg url    "$URL" \
            --arg author "$AUTHOR" \
            --arg label  "$LABEL" \
            --arg number "$NUMBER" \
            '"<b>GitHub Discussion #\($number)</b><br>" +
             "<b>Author:</b> \($author)<br>" +
             "<b>Label:</b> \($label)<br>" +
             "<b>Source:</b> <a href=\"\($url)\">\($url)</a><br><br>" +
             "<hr><b>Description:</b><br>" +
             ($body | gsub("\n"; "<br>"))'
          )

          jq -n \
            --arg title "$TITLE" \
            --arg desc  "$DESC" \
            --arg label "$LABEL" \
            --arg url   "$URL" \
            '[
              {"op":"add","path":"/fields/System.Title",       "value": $title},
              {"op":"add","path":"/fields/System.Description", "value": $desc},
              {"op":"add","path":"/fields/System.Tags",        "value": ("github-discussion;" + $label)},
              {"op":"add","path":"/fields/System.History",     "value": ("Created from GitHub Discussion: " + $url)}
            ]' > /tmp/ado_payload.json

          echo "--- Payload ---"
          cat /tmp/ado_payload.json

      - name: Create ADO Work Item
        id: create_wi
        env:
          ADO_PAT:     ${{ secrets.ADO_PAT }}
          ADO_ORG:     ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          WI_TYPE:     ${{ steps.map_label.outputs.wi_type }}
        run: |
          ENCODED_PROJECT=$(python3 -c \
            "import urllib.parse, os; print(urllib.parse.quote(os.environ['ADO_PROJECT']))")

          ADO_URL="https://dev.azure.com/${ADO_ORG}/${ENCODED_PROJECT}/_apis/wit/workitems/\$${WI_TYPE}?api-version=7.1"
          echo "POST -> $ADO_URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$ADO_URL" \
            --user ":${ADO_PAT}" \
            -H "Content-Type: application/json-patch+json" \
            -d @/tmp/ado_payload.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESP_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "$RESP_BODY" | jq . || echo "$RESP_BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::ADO API returned HTTP $HTTP_CODE"
            echo "$RESP_BODY" | jq -r '.message // .'
            exit 1
          fi

          WI_ID=$(echo "$RESP_BODY"  | jq -r '.id')
          WI_URL=$(echo "$RESP_BODY" | jq -r '._links.html.href')
          echo "wi_id=$WI_ID"   >> "$GITHUB_OUTPUT"
          echo "wi_url=$WI_URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Work Item #$WI_ID -> $WI_URL"

      - name: Comment on Discussion
        if: steps.create_wi.outputs.wi_id != '' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          DISC_NUM: ${{ steps.inputs.outputs.number }}
          WI_ID:    ${{ steps.create_wi.outputs.wi_id }}
          WI_URL:   ${{ steps.create_wi.outputs.wi_url }}
          WI_TYPE:  ${{ steps.map_label.outputs.wi_type }}
        run: |
          BODY=$(jq -rn \
            --arg id   "$WI_ID" \
            --arg url  "$WI_URL" \
            --arg type "$WI_TYPE" \
            '"### Synced to Azure DevOps\n\n| Field | Value |\n|---|---|\n| **Type** | \($type) |\n| **ID** | #\($id) |\n| **Link** | \($url) |\n\n> _Auto-created by the ADO Sync workflow._"'
          )
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/discussions/$DISC_NUM/comments" \
            -f "body=$BODY"
