name: Sync Labeled Discussion to Power Automate

on:
  discussion:
    types: [labeled]
  workflow_dispatch:
    inputs:
      label:
        description: "Label to simulate"
        required: true
        default: "bug"
        type: choice
        options:
          - bug
          - feature
      discussion_title:
        description: "Discussion title"
        required: true
        default: "Test: Login page crashes on mobile"
      discussion_body:
        description: "Discussion body"
        required: true
        default: "Steps to reproduce: 1. Open app on mobile 2. Tap login 3. App crashes"
      discussion_number:
        description: "Discussion number"
        required: true
        default: "1"
      discussion_url:
        description: "Discussion URL"
        required: true
        default: "https://github.com/golclinics/discussions/discussions/1"
      discussion_author:
        description: "Discussion author"
        required: true
        default: "test-user"

permissions:
  contents: read
  discussions: write

jobs:
  send-to-power-automate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'bug' ||
      github.event.label.name == 'feature'
    runs-on: ubuntu-latest

    steps:
      - name: Validate Required Secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}" ] && MISSING="$MISSING POWER_AUTOMATE_WEBHOOK_URL (secret)"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required config:$MISSING"
            exit 1
          fi
          echo "POWER_AUTOMATE_WEBHOOK_URL: [set]"

      - name: Resolve Inputs
        id: inputs
        env:
          # Single-line values — safe as plain env vars
          EVENT_LABEL:        ${{ github.event.label.name }}
          EVENT_NUMBER:       ${{ github.event.discussion.number }}
          EVENT_URL:          ${{ github.event.discussion.html_url }}
          EVENT_AUTHOR:       ${{ github.event.discussion.user.login }}
          EVENT_CREATED:      ${{ github.event.discussion.created_at }}
          INPUT_LABEL:        ${{ inputs.label }}
          INPUT_NUMBER:       ${{ inputs.discussion_number }}
          INPUT_URL:          ${{ inputs.discussion_url }}
          INPUT_AUTHOR:       ${{ inputs.discussion_author }}
          # Multiline values — toJSON() encodes newlines as \n making them single-line safe
          EVENT_TITLE_JSON:   ${{ toJSON(github.event.discussion.title) }}
          EVENT_BODY_JSON:    ${{ toJSON(github.event.discussion.body) }}
          INPUT_TITLE_JSON:   ${{ toJSON(inputs.discussion_title) }}
          INPUT_BODY_JSON:    ${{ toJSON(inputs.discussion_body) }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "label=$INPUT_LABEL"                           >> "$GITHUB_OUTPUT"
            echo "number=$INPUT_NUMBER"                         >> "$GITHUB_OUTPUT"
            echo "url=$INPUT_URL"                               >> "$GITHUB_OUTPUT"
            echo "author=$INPUT_AUTHOR"                         >> "$GITHUB_OUTPUT"
            echo "created_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
            # Decode JSON-encoded strings into temp files — safe for any content
            printf '%s' "$INPUT_TITLE_JSON" | jq -r . > /tmp/discussion_title.txt
            printf '%s' "$INPUT_BODY_JSON"  | jq -r . > /tmp/discussion_body.txt
          else
            echo "label=$EVENT_LABEL"                           >> "$GITHUB_OUTPUT"
            echo "number=$EVENT_NUMBER"                         >> "$GITHUB_OUTPUT"
            echo "url=$EVENT_URL"                               >> "$GITHUB_OUTPUT"
            echo "author=$EVENT_AUTHOR"                         >> "$GITHUB_OUTPUT"
            echo "created_at=$EVENT_CREATED"                    >> "$GITHUB_OUTPUT"
            printf '%s' "$EVENT_TITLE_JSON" | jq -r . > /tmp/discussion_title.txt
            printf '%s' "$EVENT_BODY_JSON"  | jq -r . > /tmp/discussion_body.txt
          fi

      - name: Build Payload
        env:
          URL:     ${{ steps.inputs.outputs.url }}
          AUTHOR:  ${{ steps.inputs.outputs.author }}
          LABEL:   ${{ steps.inputs.outputs.label }}
          NUMBER:  ${{ steps.inputs.outputs.number }}
          CREATED: ${{ steps.inputs.outputs.created_at }}
          REPO:    ${{ github.repository }}
        run: |
          # Read user content from temp files — never went through GITHUB_OUTPUT
          TITLE=$(cat /tmp/discussion_title.txt)
          BODY=$(cat /tmp/discussion_body.txt)

          jq -n \
            --arg number   "$NUMBER" \
            --arg title    "$TITLE" \
            --arg body     "$BODY" \
            --arg author   "$AUTHOR" \
            --arg label    "$LABEL" \
            --arg url      "$URL" \
            --arg repo     "$REPO" \
            --arg created  "$CREATED" \
            '{
              number:     ($number | tonumber),
              title:      $title,
              body:       $body,
              author:     $author,
              label:      $label,
              url:        $url,
              repository: $repo,
              created_at: $created
            }' > /tmp/pa_payload.json

          echo "--- Payload ---"
          cat /tmp/pa_payload.json

      - name: Send to Power Automate
        id: send
        env:
          WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_RETRIES"

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @/tmp/pa_payload.json)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESP_BODY=$(echo "$RESPONSE" | sed '$d')

            echo "HTTP Status: $HTTP_CODE"
            echo "$RESP_BODY"

            # Power Automate returns 202 Accepted for async flows
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
              echo "::notice::Successfully sent discussion #${{ steps.inputs.outputs.number }} to Power Automate"
              exit 0
            fi

            # Check for non-retryable Power Automate errors
            ERROR_CODE=$(echo "$RESP_BODY" | jq -r '.error.code // empty' 2>/dev/null || true)
            if [ "$ERROR_CODE" = "WorkflowTriggerIsNotEnabled" ]; then
              echo "::error::Power Automate flow is suspended and must be re-enabled before it can accept requests. Go to Power Automate, find the flow, and turn it on."
              exit 1
            fi

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "::warning::Power Automate webhook returned HTTP $HTTP_CODE. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "::error::Power Automate webhook returned HTTP $HTTP_CODE after $MAX_RETRIES attempts"
          exit 1

      - name: Comment on Discussion
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          DISC_NUM: ${{ steps.inputs.outputs.number }}
          LABEL:    ${{ steps.inputs.outputs.label }}
        run: |
          BODY=$(jq -rn \
            --arg label "$LABEL" \
            '"### Synced to Power Automate\n\n| Field | Value |\n|---|---|\n| **Label** | \($label) |\n| **Status** | Sent for processing |\n\n> _Auto-triggered by the Power Automate Sync workflow._"'
          )
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/discussions/$DISC_NUM/comments" \
            -f "body=$BODY"
